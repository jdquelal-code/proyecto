<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Jose Quelal</title>
    
    <style>
        /* Estilo Aesthetic Verde Unificado */
        :root {
            --verde-oscuro: #2d4a22;
            --verde-principal: #6a994e;
            --verde-claro: #a7c957;
            --verde-fondo: #f2f4f3;
            --blanco: #ffffff;
            --borde: #dce3da;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--verde-fondo);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 500px;
            background-color: var(--verde-oscuro);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; }

        /* Cuadrito del Formulario */
        form {
            background: var(--blanco);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--borde);
        }

        /* Contenedor para cada grupo de etiqueta e input */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--verde-oscuro);
        }

        /* Estilo de los cuadros de texto */
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box; /* Para que el padding no ensanche el input */
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--verde-principal);
            background-color: #f9fbf9;
        }

        /* Botón Estético */
        button {
            width: 100%;
            background-color: var(--verde-principal);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--verde-oscuro);
        }

        .back-link {
            align-self: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--verde-principal);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-link">← Volver al inicio</a>

    <header>
        <h1>Formulario de Registro</h1>
    </header>

    <form action="/guardar-registro" method="POST">
        <div class="form-group">
            <label for="usuario">Nombre de usuario:</label>
            <input type="text" id="usuario" placeholder="Ej. jperez123">
        </div>

        <div class="form-group">
            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento">
        </div>

        <button type="submit">Registrarse en el sistema</button>
    </form>

    <footer style="margin-top: 30px; color: var(--verde-oscuro); font-size: 0.9rem;">
        <p>Desarrollado por Jose Quelal &copy; 2026</p>
    </footer>

</body>
</html>
