<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Responsivo - Jose Quelal</title>
    
    <style>
        /* Variables Aesthetic Verde */
        :root {
            --verde-oscuro: #2d4a22;
            --verde-principal: #6a994e;
            --verde-claro: #a7c957;
            --verde-fondo: #f2f4f3;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--verde-fondo);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            background-color: var(--verde-oscuro);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        /* 2. Estilos normales (para pantallas grandes) */
        .contenedor {
            width: 80%;
            max-width: 800px;
            background-color: var(--blanco);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            text-align: center;
            margin: 0 auto;
        }

        /* 1. Regla de oro para imágenes en móviles */
        .imagen-fluida {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid var(--verde-claro);
        }

        h2 {
            color: var(--verde-oscuro);
            margin-bottom: 15px;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        /* 3. Media Query: SOLO se activa si la pantalla mide menos de 600px */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .contenedor {
                width: 100%; /* Ocupa todo el ancho en celulares */
                padding: 10px;
                border-radius: 0; /* Opcional: bordes rectos en móvil para ganar espacio */
            }
            header {
                border-radius: 0;
            }
        }

        .back-link {
            align-self: flex-start;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--verde-principal);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-link">← Volver al inicio</a>

    <header>
        <h1>Diseño Responsivo</h1>
    </header>

    <div class="contenedor">
        <h2>Visualización Adaptable</h2>
        <img class="imagen-fluida" src="../imagenes/img_robot.jpg" alt="Prototipo de robot">
        <p>Prueba a cambiar el tamaño de la ventana del navegador para ver cómo la imagen y el cuadro verde se adaptan automáticamente.</p>
    </div>

    <footer style="margin-top: 30px; color: var(--verde-oscuro); font-size: 0.8rem;">
        <p>Técnica de Media Queries por Jose Quelal &copy; 2026</p>
    </footer>

</body>
</html>
