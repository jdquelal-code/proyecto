<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucles</title>
</head>
<body>


<script>
    //Bucle for

    console.log("Numeros de 1 al 10");
    //Mostrar en consola numeros del 1 al 10
    for(let i=1; i <= 10; i++){
        //instrucciones que se repiten
        console.log(i);
    }


    //Mostrar en consola numeros del 10 al 1
    console.log("Numeros de 10 al 1")
    for(let i=10; i >= 1; i--){
        //Instrucciones que se repiten
        console.log(i);
    }
    //Bucle white

    let numero = 5;

    while(numero <50){
        console.log(numero);
        numero +=5;



    }

    numero = 5

    console.log("10 primeros multiplos de 5 utilizados do.. while");
    do{
        console.log(numero);
        numero = numero + 5;
    }while(numero <= 50)


    //instruciones de control

    console.log("instrucciones de control break y continue")

    for(let j=0; j<100;j++){

        if(j % 3 === 0){
            continue; // salta al siguiente iterador
        }

        console.log(j);

        if(j === 30){
            break; // Detiene la ejecucuión
        }

    }



</script>
    
</body>
</html>
